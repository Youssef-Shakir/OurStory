version: '3.8'

# Use this file for local development with bind mounts
# Run with: docker-compose -f docker-compose.local.yml up --build

services:
  memories-album:
    build: .
    container_name: memories-album
    ports:
      - "3000:3000"
    environment:
      - VIEWER_PINCODE=0000
      - USER_PINCODE=1234
      - ADMIN_PINCODE=admin123
      - CURATED_PINCODE=5555
      - SECRET_KEY=your-super-secret-key-change-me
      - PORT=3000
    volumes:
      # Bind mounts - files stored in your project folder
      - ./uploads:/app/public/uploads
      - ./data:/app/data
    restart: unless-stopped
